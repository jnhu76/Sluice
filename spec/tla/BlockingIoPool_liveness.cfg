\* TLC liveness config for BlockingIoPool (sluice-CORE-024S).
\* Checks modeled-task progress under weak fairness on Dequeue+Complete.
\* Run:  java -cp /tmp/tla2tools.jar tlc2.TLC -config BlockingIoPool_liveness.cfg BlockingIoPool.tla
\*
\* Terminal quiescence is checked by the safety config's NoInternalProtocolStuck
\* invariant. Do not use TLC's built-in deadlock check as a production
\* deadlock-freedom claim.
CHECK_DEADLOCK FALSE

CONSTANTS
    NumWorkers = 2
    MaxDepth = 2
    NumTasks = 3

\* Liveness uses the fair specification (weak fairness on worker actions).
SPECIFICATION FairSpec

\* Modeled-task progress: every accepted modeled task eventually reaches done.
PROPERTY TemporalProperty
