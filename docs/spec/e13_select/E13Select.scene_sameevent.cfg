\* E13Select scene: same-Event multi-arm configuration (§L).
\* Proves R8 (same Event with multiple Select arms) reachable (§K).
\*
\* In the model, arms are distinct slots; "the same Event" is modelled as
\* multiple Event-kind arms whose event_state is Set together (they observe
\* one Event's SET broadcast). The witness: >=2 Event arms both Retired after
\* a single Event SET broadcast, with the Event's persistent SET preserved
\* (event_state stays Set -- preparation S13/I12: Event not consumed).
SPECIFICATION Spec
INVARIANT NotReach_R8

CONSTANTS
MaxArms = 2
Arms = {0, 1}
Events = {0, 1}
