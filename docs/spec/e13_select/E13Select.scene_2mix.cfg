\* E13Select scene: 2-arm mixed Event + Timer configuration (§L).
\* Binds R5 (Event winner + Timer loser) on a 2-arm mixed domain (§K). The two
\* arms race; whichever ClaimWinner selects wins and the other is retired
\* (Timer loser -> Retired reg + Cancelled; Event loser -> Cancelled). This
\* config asserts only NotReach_R5, so its named witness is the Event-winner
\* outcome; the symmetric Timer-winner outcome (R6) is witnessed by the separate
\* scene_2mix_timer_winner.cfg.
SPECIFICATION Spec
INVARIANT NotReach_R5

CONSTANTS
MaxArms = 2
Arms = {0, 1}
Events = {0, 1}
