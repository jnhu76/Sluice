\* NEG-C9: winner identity flip after linearization.
\* Fault_C9 flips the live winner to a different registered arm B (B # A)
\* while leaving the frozen linearized_winner = A and linearized_winner_valid
\* = TRUE untouched, and no arm is WinnerCommitted.
\* Target: C_InvWinnerIdentityStableAfterLinearization.
SPECIFICATION CNegSpec
INVARIANT C_InvWinnerIdentityStableAfterLinearization
CONSTANTS
MaxArms = 2
Arms = {0, 1}
FAULT = "C9"
