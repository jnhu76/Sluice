\* E13Select scene: post-suspension configuration (§L).
\* Binds R3 (Event post-suspension winner) on a 2-arm domain (§K) and
\* contributes to R12 (CompletedSuspended -> Consumed).
\*
\* Domain: 2 arms. The post-suspension path: no arm ready at admission ->
\* SuspendCaller -> caller Waiting -> external EventSet/Tick -> Observe*Ready
\* -> ClaimWinner -> CompleteSuspended (runnable count = 1). This config asserts
\* only NotReach_R3, so its named witness is the Event post-suspension winner;
\* the symmetric Timer post-suspension winner (R4) is witnessed by the separate
\* scene_suspended_timer.cfg. NOTE: post-suspension CANCELLATION (no winner,
\* caller must be woken) is NOT in scope -- PR #17 only models post-suspension
\* WINNER publication here.
SPECIFICATION Spec
INVARIANT NotReach_R3

CONSTANTS
MaxArms = 2
Arms = {0, 1}
Events = {0, 1}
