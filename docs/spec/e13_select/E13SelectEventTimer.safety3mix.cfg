\* PR #18 Event/Timer adapter safety on a 3-arm mixed domain (two Event arms
\* sharing one Event identity + one independent Timer arm).  Exercises the
\* same-Event multi-arm scan law (E_InvSameEventArmsShareIdentity /
\* E_InvBroadcastScansOnlyTargetEventArms) and the Event+Timer accounting laws.
\* Bounded by FourArmMixedConstraint reduced to 3 arms is not possible, so the
\* full unconstrained 3-arm adapter graph is used; the safety suite still
\* exhausts.
SPECIFICATION EventTimerSpec
INVARIANT AdapterSafetyInv

CONSTANTS
MaxArms = 3
Arms = {0, 1, 2}
Events = {0, 1}
