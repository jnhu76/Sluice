\* witnesses in a single TLC run: only the first violated invariant stops
\* TLC, so the other two witnesses were never actually produced.  This file
\* is preserved as a documentation pointer, but the safety verifier no longer
\* uses it.  The three witnesses are now checked by three INDEPENDENT cfgs,
\* each carrying a single INVARIANT line:
