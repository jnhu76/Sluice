\* NEG-MG1: cross-group authority mutation during rollback.
\* Fault_MG1 makes group g0's RollbackArm spuriously RE-OPEN group g1's
\* authority while group g1 has independently reached a terminal phase with
\* correctly closed authority.  This is the load-bearing transition-level
\* non-interference fault: g0's rollback action's UNCHANGED list freezes
\* every group-h field, so the fault mutates group g1's authority as a side
\* effect, which the canonical action would never do.
\* Target: MG_InvAuthorityClosureDoesNotCrossGroups.
