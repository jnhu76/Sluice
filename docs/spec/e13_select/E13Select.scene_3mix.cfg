\* E13Select scene: 3-arm mixed configuration (§L).
\* A 3-arm mixed Event+Timer scene (e.g. 2 Event + 1 Timer, or 1 Event + 2
\* Timer). Exercises the winner/loser retirement across 3 arms and the
\* lowest-index tie-break among potentially multiple ready arms. Reuses the
\* R5 predicate (Event winner + Timer loser) over the richer domain; the 3-arm
\* witness demonstrates retirement scales to >2 arms.
SPECIFICATION Spec
INVARIANT NotReach_R5

CONSTANTS
MaxArms = 3
Arms = {0, 1, 2}
Events = {0, 1}
