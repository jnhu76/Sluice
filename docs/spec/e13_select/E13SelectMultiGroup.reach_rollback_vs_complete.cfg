\* PR #18 corrective-1 multi-group reach witness (D3):
\* one group (gr) reaches a real registration rollback (Register arm while
\* phase remains Registering -> BeginRollback -> RollbackArm -> FinishRollback
\* -> Aborted/Destroyed, no publication), while the other group (gc) finishes
\* registration and completes with exactly one publication.  The trace must
\* demonstrate g_rollback_started[gr]=TRUE, g_result_published[gr]=0,
\* g_phase[gr] in {Aborted, Destroyed}, g_result_published[gc]=1, and
\* g_phase[gc] in {Completed, Consumed}.
SPECIFICATION MGSpec
INVARIANT NotMG_ReachOneRollbackOtherComplete

CONSTANTS
Groups = {0, 1}
Events = {0}
