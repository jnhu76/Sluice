\* E13Select scene: admission-ready inline configuration (§L).
\* Binds R1 (Event inline winner) on a 2-arm mixed inline domain (§K) and
\* contributes to R11 (CompletedInline -> Consumed).
\*
\* Domain: 2 arms (one Event, one Timer) -- the minimal mixed inline scene.
\* An arm is admission-ready iff its primitive is ready at FinishRegistration
\* (event_state=Set / timer_due). This config asserts only NotReach_R1, so its
\* named witness is the Event-winner outcome; the symmetric Timer-winner inline
\* outcome (R2) is witnessed by the separate scene_inline_timer.cfg.
SPECIFICATION Spec

\* R1: Event admission-ready inline winner. A TLC "Invariant violated" with a
\* reachable counterexample state is the reachability witness (see README).
INVARIANT NotReach_R1

CONSTANTS
MaxArms = 2
Arms = {0, 1}
Events = {0, 1}
